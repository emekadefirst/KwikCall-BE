<table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #FFFFFF;">
    <tr>
        <td align="center" style="padding: 32px 20px;">
            <table width="100%" style="max-width: 600px;" border="0" cellspacing="0" cellpadding="0">
                <tr>
                    <td style="padding-bottom: 24px;">
                        <h1 style="color: #0C2C55; font-size: 28px; font-weight: 700; line-height: 34px;">New Contact
                            Message</h1>
                    </td>
                </tr>
                <tr>
                    <td
                        style="background-color: #FFF8E1; border-radius: 16px; padding: 32px; border: 1px solid #FFE082;">
                        <table width="100%" border="0" cellspacing="0" cellpadding="0">
                            <tr>
                                <td style="padding-bottom: 12px;">
                                    <span
                                        style="color: #0C2C55; font-size: 11px; font-weight: 700; text-transform: uppercase;">From</span>
                                    <p style="margin: 4px 0 0 0; color: #333333; font-size: 15px; font-weight: 600;">
                                        {{name}}</p>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding-bottom: 12px;">
                                    <span
                                        style="color: #0C2C55; font-size: 11px; font-weight: 700; text-transform: uppercase;">Email</span>
                                    <p style="margin: 4px 0 0 0; color: #333333; font-size: 15px;">{{email}}</p>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding-bottom: 12px;">
                                    <span
                                        style="color: #0C2C55; font-size: 11px; font-weight: 700; text-transform: uppercase;">Phone</span>
                                    <p style="margin: 4px 0 0 0; color: #333333; font-size: 15px;">{{phone}}</p>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding-bottom: 12px;">
                                    <span
                                        style="color: #0C2C55; font-size: 11px; font-weight: 700; text-transform: uppercase;">Category</span>
                                    <p style="margin: 4px 0 0 0; color: #333333; font-size: 15px;">{{category}}</p>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <span
                                        style="color: #0C2C55; font-size: 11px; font-weight: 700; text-transform: uppercase;">Message</span>
                                    <div
                                        style="background-color: #FFFFFF; border-left: 4px solid #0C2C55; border-radius: 4px; padding: 16px; margin-top: 8px;">
                                        <p style="margin: 0; color: #333333; font-size: 14px; line-height: 22px;">
                                            {{message}}</p>
                                    </div>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
