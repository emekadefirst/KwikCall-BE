<table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #FFFFFF;">
    <tr>
      <td align="center" style="padding: 32px 20px;">

          <tr>
            <td style="padding-bottom: 24px;">
              <h1 style="color: #0C2C55; font-size: 28px; font-weight: 700; line-height: 34px;">Upcoming Events</h1>
            </td>
          </tr>
          <tr>
            <td style="background-color: #EDEDCE; border-radius: 16px; padding: 24px; margin-bottom: 20px;">
              <table width="100%" border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td>
                    <span style="color: #0C2C55; font-size: 11px; font-weight: 700; text-transform: uppercase;">Sat, March 28 • 10:00 AM</span>
                    <h2 style="margin: 8px 0; color: #0C2C55; font-size: 22px; font-weight: 600; line-height: 28px;">{{eventName}}</h2>
                    <p style="margin: 0 0 20px 0; color: #0C2C55; font-size: 13px; font-weight: 400; line-height: 18px;">{{eventDescription}}</p>
                    <a href="#" style="background-color: #0C2C55; color: #FFFFFF; padding: 10px 20px; text-decoration: none; border-radius: 24px; font-size: 13px; font-weight: 500; display: inline-block;">Save my spot</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr><td style="height: 20px;"></td></tr>
          <tr>
            <td style="background-color: #FFFFFF; border: 1px solid #EDEDCE; border-radius: 16px; padding: 24px;">
              <table width="100%" border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td>
                    <span style="color: #0C2C55; font-size: 11px; font-weight: 700; text-transform: uppercase;">Wed, April 02 • 06:00 PM</span>
                    <h2 style="margin: 8px 0; color: #0C2C55; font-size: 22px; font-weight: 600; line-height: 28px;">Nutrition Webinar</h2>
                    <p style="margin: 0 0 20px 0; color: #0C2C55; font-size: 13px; font-weight: 400; line-height: 18px;">Understanding meal prep and healthy eating in a busy world.</p>
                    <a href="#" style="background-color: #0C2C55; color: #FFFFFF; padding: 10px 20px; text-decoration: none; border-radius: 24px; font-size: 13px; font-weight: 500; display: inline-block;">Register</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
</table>
