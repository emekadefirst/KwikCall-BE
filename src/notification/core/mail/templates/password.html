<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background-color: #FFFFFF; font-family: 'DM Sans', sans-serif;">
  <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #FFFFFF;">
    <tr>
      <td align="center" style="padding: 32px 20px;">
        <table width="100%" style="max-width: 600px; background-color: #EDEDCE; border-radius: 16px; overflow: hidden;" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td align="center" style="padding: 40px 20px 20px 20px;">
              <img src="https://res.cloudinary.com/dtvitql5p/image/upload/v1772300422/happyFitLogo_nbsxqx.jpg" alt="HappyFit" width="140" style="display: block; border: 0;">
            </td>
          </tr>
          <tr>
            <td align="center" style="padding: 20px 32px 40px 32px;">
              <h1 style="margin: 0; color: #0C2C55; font-size: 28px; font-weight: 700; line-height: 34px;">Password Reset</h1>
              <p style="margin: 20px 0 32px 0; color: #0C2C55; font-size: 15px; font-weight: 400; line-height: 22px;">
                Hi {{name}}, use the code below to reset your HappyFit password. This code expires in 10 minutes.
              </p>
              <div style="background-color: #FFFFFF; border-radius: 12px; padding: 24px; border: 1px solid #0C2C55;">
                <span style="font-size: 32px; font-weight: 700; letter-spacing: 12px; color: #0C2C55;">{{otp}}</span>
              </div>
              <p style="margin: 32px 0 0 0; color: #0C2C55; font-size: 11px; font-weight: 400; line-height: 16px; opacity: 0.7;">
                If you didn't request this, please ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
