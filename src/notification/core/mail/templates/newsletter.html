<table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #FFFFFF;">
    <tr>
        <td align="center" style="padding: 32px 20px;">
            <table width="100%" style="max-width: 600px;" border="0" cellspacing="0" cellpadding="0">
                <tr>
                    <td style="padding-bottom: 24px; text-align: center;">
                        <h1 style="color: #0C2C55; font-size: 28px; font-weight: 700; line-height: 34px;">{{title}}</h1>
                    </td>
                </tr>
                <tr>
                    <td style="background-color: #F5F7FA; border-radius: 16px; padding: 32px;">
                        <p style="margin: 0 0 24px 0; color: #333333; font-size: 15px; line-height: 24px;">
                            {{content}}
                        </p>
                        <table width="100%" border="0" cellspacing="0" cellpadding="0">
                            <tr>
                                <td align="center">
                                    <a href="{{newsUrl}}"
                                        style="background-color: #0C2C55; color: #FFFFFF; padding: 14px 28px; text-decoration: none; border-radius: 24px; font-size: 15px; font-weight: 500; display: inline-block;">Read
                                        Full Article</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="padding-top: 24px; text-align: center;">
                        <p style="margin: 0; color: #999999; font-size: 12px; line-height: 18px;">
                            You received this because you subscribed to Part Central updates.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
